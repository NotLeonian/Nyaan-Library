name: verify

on:
  push:
    paths-ignore:
      - '.verify-helper/timestamps.remote.json'
  workflow_dispatch:
    inputs:
      full_verify:
        description: "Ignore .verify-helper/timestamps.remote.json and re-run all verification"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "37 5 1 * *"
      timezone: "Asia/Tokyo"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<82" "online-judge-verify-helper==5.6.0"

    - name: Check AVX2 support
      run: |
        if ! grep -qw avx2 /proc/cpuinfo; then
          echo "::error::This runner does not expose AVX2. SIMD verification cannot run safely."
          lscpu || true
          exit 1
        fi

    - name: Disable oj-verify timestamp cache for full verification
      if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_verify) }}
      run: |
        rm -f .verify-helper/timestamps.remote.json
        rm -rf .verify-helper/cache

    - name: Verify
      env:
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify run --timeout inf --tle 120

    - name: Check timestamp completeness
      run: |
        python3 - <<'PY'
        import json
        import pathlib
        import sys

        import onlinejudge_verify.config
        import onlinejudge_verify.languages.list
        import onlinejudge_verify.utils

        onlinejudge_verify.config.set_config_path(pathlib.Path(".verify-helper/config.toml"))

        expected = []
        for p in sorted(onlinejudge_verify.utils.iterate_verification_files()):
            lang = onlinejudge_verify.languages.list.get(p)
            if lang is None:
                continue
            attrs = lang.list_attributes(p, basedir=pathlib.Path.cwd())
            if "IGNORE" in attrs:
                continue
            expected.append(str(p))

        with open(".verify-helper/timestamps.remote.json") as f:
            timestamps = json.load(f)

        missing = [p for p in expected if p not in timestamps]

        print("expected:", len(expected))
        print("timestamp entries:", len(timestamps))
        print("missing:", len(missing))

        if missing:
            print("first missing entries:")
            for p in missing[:100]:
                print(p)
            sys.exit(1)
        PY

    - name: Generate GitHub App token
      if: success() && github.ref == 'refs/heads/master'
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.VERIFIER_APP_ID }}
        private-key: ${{ secrets.VERIFIER_APP_PRIVATE_KEY }}
        permission-contents: write

    - name: Commit verification timestamps
      if: success() && github.ref == 'refs/heads/master'
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config user.name "nyaan-library-verifier[bot]"
        git config user.email "noreply@github.com"

        git add .verify-helper/timestamps.remote.json

        if git diff --quiet --staged; then
          echo "No timestamp changes"
          exit 0
        fi

        git commit -m "[auto-verifier] verify commit ${GITHUB_SHA}"
        git pull --rebase origin master
        git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master

    - name: Generate docs
      if: success() && github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
      run: oj-verify docs
