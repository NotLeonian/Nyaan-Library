name: verify

on:
  push:
    paths-ignore:
      - '.verify-helper/timestamps.remote.json'
  workflow_dispatch:
    inputs:
      full_verify:
        description: "Ignore .verify-helper/timestamps.remote.json and re-run all verification"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "37 5 1 * *"
      timezone: "Asia/Tokyo"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<82" "online-judge-verify-helper==5.6.0"
      

    - name: Check documentation_of consistency
      run: |
        set -euo pipefail

        script="${RUNNER_TEMP}/check-documentation-of.py"

        {
          printf '%s\n' 'import pathlib'
          printf '%s\n' 'import sys'
          printf '%s\n' ''
          printf '%s\n' 'from onlinejudge_verify.documentation import configure'
          printf '%s\n' 'from onlinejudge_verify.documentation import front_matter as oj_front_matter'
          printf '%s\n' 'from onlinejudge_verify.documentation import main as doc_main'
          printf '%s\n' 'from onlinejudge_verify.languages import list as language_list'
          printf '%s\n' ''
          printf '%s\n' 'DOCUMENTATION_OF = "documentation_of"'
          printf '%s\n' ''
          printf '%s\n' 'basedir = pathlib.Path.cwd().resolve()'
          printf '%s\n' 'config = doc_main.load_render_config(basedir=basedir)'
          printf '%s\n' ''
          printf '%s\n' 'excluded_paths = ['
          printf '%s\n' '    pathlib.Path(p)'
          printf '%s\n' '    for p in config.config_yml.get("exclude", [])'
          printf '%s\n' ']'
          printf '%s\n' ''
          printf '%s\n' 'bad = []'
          printf '%s\n' ''
          printf '%s\n' 'for md in sorted(configure.find_markdown_paths(basedir=basedir)):'
          printf '%s\n' '    md_abs = md.resolve()'
          printf '%s\n' '    rel_md = md_abs.relative_to(basedir)'
          printf '%s\n' ''
          printf '%s\n' '    if configure.is_excluded(rel_md, excluded_paths=excluded_paths):'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    front_matter, _ = oj_front_matter.split_front_matter(md_abs.read_bytes())'
          printf '%s\n' '    documentation_of = front_matter.get(DOCUMENTATION_OF)'
          printf '%s\n' ''
          printf '%s\n' '    if documentation_of is None:'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    if not isinstance(documentation_of, str):'
          printf '%s\n' '        bad.append((rel_md, documentation_of, "documentation_of must be a string"))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    src = configure.resolve_documentation_of('
          printf '%s\n' '        documentation_of,'
          printf '%s\n' '        markdown_path=rel_md,'
          printf '%s\n' '        basedir=basedir,'
          printf '%s\n' '    )'
          printf '%s\n' ''
          printf '%s\n' '    if src is None:'
          printf '%s\n' '        bad.append((rel_md, documentation_of, "source file is not found"))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    src_abs = src.resolve()'
          printf '%s\n' '    rel_src = src_abs.relative_to(basedir)'
          printf '%s\n' ''
          printf '%s\n' '    if configure.is_excluded(rel_src, excluded_paths=excluded_paths):'
          printf '%s\n' '        bad.append(('
          printf '%s\n' '            rel_md,'
          printf '%s\n' '            documentation_of,'
          printf '%s\n' '            f"points to excluded source: {rel_src}",'
          printf '%s\n' '        ))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' '    if language_list.get(rel_src) is None:'
          printf '%s\n' '        bad.append(('
          printf '%s\n' '            rel_md,'
          printf '%s\n' '            documentation_of,'
          printf '%s\n' '            f"points to a file that oj-verify docs does not treat as source code: {rel_src}",'
          printf '%s\n' '        ))'
          printf '%s\n' '        continue'
          printf '%s\n' ''
          printf '%s\n' 'for md, documentation_of, reason in bad:'
          printf '%s\n' '    print(f"{md}: documentation_of={documentation_of!r}: {reason}")'
          printf '%s\n' ''
          printf '%s\n' 'if bad:'
          printf '%s\n' '    sys.exit(1)'
        } > "${script}"

        python3 "${script}"

    - name: Check AVX2 support
      run: |
        if ! grep -qw avx2 /proc/cpuinfo; then
          echo "::error::This runner does not expose AVX2. SIMD verification cannot run safely."
          lscpu || true
          exit 1
        fi

    - name: Disable oj-verify timestamp cache for full verification
      if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_verify) }}
      run: |
        rm -f .verify-helper/timestamps.remote.json
        rm -rf .verify-helper/cache

    - name: Verify
      env:
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify run --timeout inf --tle 120

    - name: Check timestamp completeness
      run: |
        python3 - <<'PY'
        import json
        import pathlib
        import sys

        import onlinejudge_verify.config
        import onlinejudge_verify.languages.list
        import onlinejudge_verify.utils

        onlinejudge_verify.config.set_config_path(pathlib.Path(".verify-helper/config.toml"))

        expected = []
        for p in sorted(onlinejudge_verify.utils.iterate_verification_files()):
            lang = onlinejudge_verify.languages.list.get(p)
            if lang is None:
                continue
            attrs = lang.list_attributes(p, basedir=pathlib.Path.cwd())
            if "IGNORE" in attrs:
                continue
            expected.append(str(p))

        with open(".verify-helper/timestamps.remote.json") as f:
            timestamps = json.load(f)

        missing = [p for p in expected if p not in timestamps]

        print("expected:", len(expected))
        print("timestamp entries:", len(timestamps))
        print("missing:", len(missing))

        if missing:
            print("first missing entries:")
            for p in missing[:100]:
                print(p)
            sys.exit(1)
        PY

    - name: Generate GitHub App token
      if: success() && github.ref == 'refs/heads/master'
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.VERIFIER_APP_ID }}
        private-key: ${{ secrets.VERIFIER_APP_PRIVATE_KEY }}
        permission-contents: write

    - name: Commit verification timestamps
      if: success() && github.ref == 'refs/heads/master'
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config user.name "nyaan-library-verifier[bot]"
        git config user.email "noreply@github.com"

        git add .verify-helper/timestamps.remote.json

        if git diff --quiet --staged; then
          echo "No timestamp changes"
          exit 0
        fi

        git commit -m "[auto-verifier] verify commit ${GITHUB_SHA}"
        git pull --rebase origin master
        git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master

    - name: Generate docs
      if: success() && github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
      shell: bash
      run: |
        set -euo pipefail

        wrapper_dir="${RUNNER_TEMP}/bin-for-oj-bundle"
        wrapper_basename="g++"
        wrapper="${wrapper_dir}/${wrapper_basename}"
        real_gxx="$(command -v g++)"

        mkdir -p "${wrapper_dir}"

        {
          printf '%s\n' '#!/usr/bin/env bash'
          printf '%s\n' 'set -euo pipefail'
          printf '%s\n' ''
          printf '%s\n' 'if [[ -z "${REAL_GXX:-}" ]]; then'
          printf '%s\n' '  echo "REAL_GXX is not set" >&2'
          printf '%s\n' '  exit 127'
          printf '%s\n' 'fi'
          printf '%s\n' ''
          printf '%s\n' 'has_fpreprocessed=0'
          printf '%s\n' 'has_dD=0'
          printf '%s\n' 'has_E=0'
          printf '%s\n' ''
          printf '%s\n' 'for arg in "$@"; do'
          printf '%s\n' '  case "$arg" in'
          printf '%s\n' '    -fpreprocessed) has_fpreprocessed=1 ;;'
          printf '%s\n' '    -dD) has_dD=1 ;;'
          printf '%s\n' '    -E) has_E=1 ;;'
          printf '%s\n' '  esac'
          printf '%s\n' 'done'
          printf '%s\n' ''
          printf '%s\n' 'if [[ "${has_fpreprocessed}${has_dD}${has_E}" == "111" ]]; then'
          printf '%s\n' '  exec "${REAL_GXX}" -w "$@"'
          printf '%s\n' 'else'
          printf '%s\n' '  exec "${REAL_GXX}" "$@"'
          printf '%s\n' 'fi'
        } > "${wrapper}"

        chmod +x "${wrapper}"
        PATH="${wrapper_dir}:${PATH}" REAL_GXX="${real_gxx}" CXX="${wrapper}" oj-verify docs
